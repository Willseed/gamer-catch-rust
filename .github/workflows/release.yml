name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release-source:
    name: Verify tag source and CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require tested main source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main --no-tags
          main_commit="$(git rev-parse origin/main)"
          if test "$GITHUB_EVENT_NAME" = "push"; then
            test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag"
            release_commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
            if test "$release_commit" != "$main_commit"; then
              echo "Release tag must point at the current main HEAD." >&2
              exit 1
            fi

            package_version="$(cargo metadata --locked --no-deps --format-version 1 | python3 -c 'import json, sys; data=json.load(sys.stdin); print(data["packages"][0]["version"])')"
            if test "$GITHUB_REF_NAME" != "v$package_version"; then
              echo "Tag $GITHUB_REF_NAME does not match Cargo version $package_version." >&2
              exit 1
            fi
            if test ! -f "packaging/release-notes-$GITHUB_REF_NAME.md"; then
              echo "Missing release notes for $GITHUB_REF_NAME." >&2
              exit 1
            fi
          else
            release_commit="$GITHUB_SHA"
            if test "$GITHUB_REF" != "refs/heads/main" || test "$release_commit" != "$main_commit"; then
              echo "Signing smoke tests must run from the current main HEAD." >&2
              exit 1
            fi
          fi

          successful_runs="$(gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$release_commit" \
            -f event=push \
            -f status=completed \
            -f per_page=100 \
            --jq '[.workflow_runs[] | select(.conclusion == "success" and .head_branch == "main")] | length')"
          if test "$successful_runs" -lt 1; then
            echo "No successful main push CI run exists for $release_commit." >&2
            exit 1
          fi

          guide_response="$(mktemp)"
          trap 'rm -f "$guide_response"' EXIT
          curl --fail --silent --show-error --proto '=https' \
            --retry 30 --retry-delay 10 --retry-all-errors \
            --output "$guide_response" \
            "https://gamer-catch.pylot.dev/guide#quick-start"
          if ! grep --fixed-strings 'data-gamercatch-site="angular-guide"' "$guide_response" > /dev/null; then
            echo "The online GamerCatch guide is unavailable or is not the expected Angular site." >&2
            exit 1
          fi

          suspicious_files="$(git ls-files | grep -Ei '(^|/)(credentials?/.*\.json|[^/]*(service[-_]?account|gmail[-_]?oauth|oauth[-_]?client|gmail[-_]?token|credentials?)[^/]*\.json)$' || true)"
          if test -n "$suspicious_files"; then
            echo "Repository contains a possible service-account credential file." >&2
            printf '%s\n' "$suspicious_files" >&2
            exit 1
          fi
          while IFS= read -r json_file; do
            if grep -Eq '("type"[[:space:]]*:[[:space:]]*"service_account")|("(client_secret|private_key|refresh_token|access_token)"[[:space:]]*:[[:space:]]*"[^"]+")' "$json_file"; then
              echo "Tracked JSON looks like a Google credential or OAuth token: $json_file" >&2
              exit 1
            fi
          done < <(git ls-files '*.json')

  macos:
    name: Package macOS arm64
    needs: verify-release-source
    runs-on: macos-15
    timeout-minutes: 45
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Prepare macOS package staging
        env:
          MACOS_PACKAGE_PHASE: prepare
        run: ./scripts/package-macos.sh

      - name: Configure Developer ID and Apple notarization
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          required_values=(
            CERTIFICATE_P12_BASE64
            CERTIFICATE_P12_PASSWORD
            NOTARY_KEY_P8_BASE64
            NOTARY_KEY_ID
            NOTARY_ISSUER_ID
            EXPECTED_TEAM_ID
          )
          for value_name in "${required_values[@]}"; do
            if [[ -z "${!value_name:-}" ]]; then
              echo "Missing required release environment secret or variable: $value_name" >&2
              exit 1
            fi
          done
          if [[ ! "$NOTARY_KEY_ID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "APPLE_NOTARY_KEY_ID must be a 10-character Apple API Key ID." >&2
            exit 1
          fi
          if [[ ! "$NOTARY_ISSUER_ID" =~ ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$ ]]; then
            echo "APPLE_NOTARY_ISSUER_ID must be a UUID." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "APPLE_TEAM_ID must be a 10-character Developer Team ID." >&2
            exit 1
          fi

          umask 077
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          notary_key_path="$RUNNER_TEMP/notary-api-key.p8"
          keychain_path="$RUNNER_TEMP/gamercatch-signing.keychain-db"
          {
            echo "MACOS_SIGNING_CERTIFICATE=$certificate_path"
            echo "MACOS_NOTARY_KEY_PATH=$notary_key_path"
            echo "MACOS_SIGNING_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$notary_key_path"
          if [[ ! -s "$certificate_path" ]]; then
            echo "Decoded Developer ID certificate is empty." >&2
            exit 1
          fi
          if ! grep -F -- '-----BEGIN PRIVATE KEY-----' "$notary_key_path" >/dev/null; then
            echo "Decoded notarization API key is not an Apple .p8 private key." >&2
            exit 1
          fi

          keychain_password="$(openssl rand -hex 32)"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 1800 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -f pkcs12 \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -x \
            -T /usr/bin/codesign
          rm -f "$certificate_path"

          private_key_lines="$(
            security find-key -t private -s "$keychain_path" 2>/dev/null || true
          )"
          private_key_count="$(
            printf '%s\n' "$private_key_lines" | grep -c '^keychain:' || true
          )"
          if [[ "$private_key_count" -ne 1 ]]; then
            echo "Developer ID PKCS#12 must contain exactly one signing private key; found $private_key_count." >&2
            exit 1
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          identity_lines="$(
            security find-identity -v -p codesigning "$keychain_path" |
              grep '"Developer ID Application:' || true
          )"
          identity_count="$(printf '%s\n' "$identity_lines" | grep -c 'Developer ID Application' || true)"
          if [[ "$identity_count" -ne 1 ]]; then
            echo "Expected exactly one Developer ID Application identity, found $identity_count." >&2
            exit 1
          fi
          sign_identity="$(printf '%s\n' "$identity_lines" | awk '{print $2}')"
          if [[ ! "$sign_identity" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Imported Developer ID identity has an invalid fingerprint." >&2
            exit 1
          fi
          {
            echo "MACOS_SIGN_IDENTITY=$sign_identity"
            echo "MACOS_NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "MACOS_NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID"
            echo "MACOS_EXPECTED_TEAM_ID=$EXPECTED_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Sign, notarize, and package
        env:
          MACOS_PACKAGE_PHASE: finalize
        run: ./scripts/package-macos.sh

      - name: Remove signing credentials
        if: always()
        shell: bash
        run: |
          cleanup_failed=0
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" && -e "$MACOS_SIGNING_KEYCHAIN" ]]; then
            if ! security delete-keychain "$MACOS_SIGNING_KEYCHAIN"; then
              echo "Failed to delete the temporary signing keychain." >&2
              cleanup_failed=1
            fi
          fi
          for sensitive_path in \
            "${MACOS_SIGNING_CERTIFICATE:-}" \
            "${MACOS_NOTARY_KEY_PATH:-}"
          do
            if [[ -n "$sensitive_path" ]]; then
              if ! rm -f "$sensitive_path"; then
                echo "Failed to delete a temporary signing credential." >&2
                cleanup_failed=1
              fi
            fi
          done
          exit "$cleanup_failed"

      - name: Validate package
        run: python3 scripts/validate-package.py --platform macos dist/GamerCatch-macOS-arm64.zip

      - name: Upload macOS assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: macos-assets
          if-no-files-found: error
          path: dist/GamerCatch-macOS-arm64.zip

  windows:
    name: Package Windows x64
    needs: verify-release-source
    if: github.event_name == 'push'
    runs-on: windows-latest
    env:
      # The owner does not yet have an Authenticode certificate. This makes
      # the unsigned preview decision explicit instead of silently falling back.
      ALLOW_UNSIGNED_WINDOWS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Build package
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Validate package
        run: python scripts/validate-package.py --platform windows dist/GamerCatch-Windows-x64.zip

      - name: Upload Windows assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: windows-assets
          if-no-files-found: error
          path: dist/GamerCatch-Windows-x64.zip

  publish:
    name: Publish GitHub release
    needs: [macos, windows]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Download packaged assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          path: release-assets
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir release-ready
          while IFS='|' read -r source_filename release_filename
          do
            match_count="$(find release-assets -type f -name "$source_filename" -print | awk 'END { print NR }')"
            if test "$match_count" -ne 1; then
              echo "Expected exactly one $source_filename, found $match_count." >&2
              exit 1
            fi
            source_path="$(find release-assets -type f -name "$source_filename" -print -quit)"
            cp "$source_path" "release-ready/$release_filename"
          done <<'FILES'
          GamerCatch-macOS-arm64.zip|GamerCatch-macOS-arm64.zip
          GamerCatch-Windows-x64.zip|GamerCatch-Windows-x64.zip
          FILES

      - name: Validate release assets
        run: |
          python3 scripts/validate-package.py --platform macos release-ready/GamerCatch-macOS-arm64.zip
          python3 scripts/validate-package.py --platform windows release-ready/GamerCatch-Windows-x64.zip
          cd release-ready
          sha256sum \
            GamerCatch-macOS-arm64.zip \
            GamerCatch-Windows-x64.zip \
            > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-ready/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "GamerCatch $GITHUB_REF_NAME（腳本版預覽）" \
            --notes-file "packaging/release-notes-$GITHUB_REF_NAME.md" \
            --latest \
            --verify-tag
