name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release-source:
    name: Verify tag source and CI
    runs-on: ubuntu-latest
    outputs:
      release_commit: ${{ steps.source.outputs.release_commit }}
      ci_run_id: ${{ steps.source.outputs.ci_run_id }}
      ci_artifact_id: ${{ steps.source.outputs.ci_artifact_id }}
      candidate_run_id: ${{ steps.source.outputs.candidate_run_id }}
      candidate_artifact_id: ${{ steps.source.outputs.candidate_artifact_id }}
      release_packager_artifact_id: ${{ steps.upload_release_packager.outputs.artifact-id }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Build Linux release packager
        run: |
          CARGO_TARGET_DIR=target/release-packager \
            cargo build --release --locked --package gamercatch-release-packager
          test -x target/release-packager/release/gamercatch-release-packager

      - name: Require tested main source
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          packager=target/release-packager/release/gamercatch-release-packager
          test -x "$packager"
          package_version="$("$packager" package-version Cargo.toml)"
          "$packager" verify-versions \
            --expected "$package_version" \
            Cargo.toml \
            tools/release-packager/Cargo.toml \
            web/package.json \
            web/package-lock.json

          require_run() {
            local run_id="$1"
            local expected_path="$2"
            local expected_event="$3"
            local label="$4"
            local run

            run="$(
              gh api --method GET \
                "repos/$GITHUB_REPOSITORY/actions/runs/$run_id"
            )"
            if ! jq -e \
              --arg run_id "$run_id" \
              --arg expected_path "$expected_path" \
              --arg expected_event "$expected_event" \
              --arg release_commit "$release_commit" \
              --arg repository "$GITHUB_REPOSITORY" \
              '
                (.id | tostring) == $run_id and
                (.run_attempt | numbers) >= 1 and
                .path == $expected_path and
                .event == $expected_event and
                .head_branch == "main" and
                .head_sha == $release_commit and
                .status == "completed" and
                .conclusion == "success" and
                .repository.full_name == $repository and
                .head_repository.full_name == $repository and
                .repository.id == .head_repository.id
              ' <<< "$run" >/dev/null
            then
              echo "$label is not a successful exact-SHA run from the expected workflow and repository." >&2
              exit 1
            fi
            printf '%s\n' "$run"
          }

          select_job_attempt() {
            local run_id="$1"
            local expected_name="$2"
            local label="$3"
            local job
            local jobs

            jobs="$(
              gh api --method GET --paginate \
                "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs" \
                -f filter=all \
                -f per_page=100 \
                --jq '.jobs[]' |
                jq -s '{jobs: .}'
            )"
            job="$(
              jq -c \
                --arg expected_name "$expected_name" \
                --arg release_commit "$release_commit" \
                '
                  [.jobs[] |
                    select(
                      .name == $expected_name and
                      .status == "completed" and
                      .conclusion == "success" and
                      .head_sha == $release_commit and
                      (.run_attempt | numbers) >= 1
                    )] |
                  sort_by(.run_attempt, .completed_at) | reverse | first // empty
                ' <<< "$jobs"
            )"
            if test -z "$job"; then
              echo "$label has no successful exact-SHA $expected_name job." >&2
              exit 1
            fi
            jq -r '.run_attempt' <<< "$job"
          }

          select_artifact() {
            local run_id="$1"
            local expected_name="$2"
            local label="$3"
            local artifact
            local artifacts
            local match_count

            artifacts="$(
              gh api --method GET --paginate \
                "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts" \
                -f per_page=100 \
                --jq '.artifacts[]' |
                jq -s '{artifacts: .}'
            )"
            match_count="$(
              jq \
                --arg expected_name "$expected_name" \
                --arg run_id "$run_id" \
                --arg release_commit "$release_commit" \
                '
                  [.artifacts[] |
                    select(
                      .name == $expected_name and
                      .expired == false and
                      .size_in_bytes > 0 and
                      (.workflow_run.id | tostring) == $run_id and
                      .workflow_run.head_sha == $release_commit and
                      ((.digest // "") | test("^sha256:[0-9a-f]{64}$"))
                    )] | length
                ' \
                <<< "$artifacts"
            )"
            if test "$match_count" -ne 1; then
              echo "$label must have exactly one current, nonempty, exact-SHA artifact with a valid digest; found $match_count." >&2
              exit 1
            fi
            artifact="$(
              jq -c --arg expected_name "$expected_name" \
                '.artifacts[] | select(.name == $expected_name)' \
                <<< "$artifacts"
            )"
            printf '%s\n' "$artifact"
          }

          git fetch origin main --no-tags
          main_commit="$(git rev-parse origin/main)"
          candidate_run_id=""
          candidate_artifact_id=""
          if test "$GITHUB_EVENT_NAME" = "push"; then
            test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag"
            release_commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
            if test "$release_commit" != "$main_commit"; then
              echo "Release tag must point at the current main HEAD." >&2
              exit 1
            fi

            if test "$GITHUB_REF_NAME" != "v$package_version"; then
              echo "Tag $GITHUB_REF_NAME does not match Cargo version $package_version." >&2
              exit 1
            fi
            if test ! -f "packaging/release-notes-$GITHUB_REF_NAME.md"; then
              echo "Missing release notes for $GITHUB_REF_NAME." >&2
              exit 1
            fi

            candidate_run_id="$(
              gh api --method GET --paginate \
                "repos/$GITHUB_REPOSITORY/actions/workflows/release.yml/runs" \
                -f head_sha="$release_commit" \
                -f event=workflow_dispatch \
                -f status=completed \
                -f per_page=100 \
                --jq '.workflow_runs[]' |
                jq -s -r '
                  [.[] |
                    select(.conclusion == "success" and .head_branch == "main")] |
                  sort_by(.created_at) | reverse | first | .id // empty
                '
            )"
            case "$candidate_run_id" in
              '' | *[!0-9]*)
                echo "No successful signing candidate run exists for $release_commit." >&2
                exit 1
                ;;
            esac
            require_run \
              "$candidate_run_id" \
              ".github/workflows/release.yml" \
              "workflow_dispatch" \
              "Signing candidate run $candidate_run_id" >/dev/null
            candidate_job_attempt="$(
              select_job_attempt \
                "$candidate_run_id" \
                "Audit reusable release candidates" \
                "Signing candidate run $candidate_run_id"
            )"
            candidate_artifact="$(
              select_artifact \
                "$candidate_run_id" \
                "release-candidates-$release_commit-attempt-$candidate_job_attempt" \
                "Signing candidate run $candidate_run_id"
            )"
            candidate_artifact_id="$(jq -r '.id' <<< "$candidate_artifact")"
          else
            release_commit="$GITHUB_SHA"
            if test "$GITHUB_REF" != "refs/heads/main" || test "$release_commit" != "$main_commit"; then
              echo "Signing smoke tests must run from the current main HEAD." >&2
              exit 1
            fi
            if test ! -f "packaging/release-notes-v$package_version.md"; then
              echo "Missing release notes for v$package_version." >&2
              exit 1
            fi
          fi

          ci_run_id="$(
            gh api --method GET --paginate \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f head_sha="$release_commit" \
              -f event=push \
              -f status=completed \
              -f per_page=100 \
              --jq '.workflow_runs[]' |
              jq -s -r '
                [.[] |
                  select(.conclusion == "success" and .head_branch == "main")] |
                sort_by(.created_at) | reverse | first | .id // empty
              '
          )"
          case "$ci_run_id" in
            '' | *[!0-9]*)
            echo "No successful main push CI run exists for $release_commit." >&2
            exit 1
              ;;
          esac
          require_run \
            "$ci_run_id" \
            ".github/workflows/ci.yml" \
            "push" \
            "Main CI run $ci_run_id" >/dev/null
          ci_job_attempt="$(
            select_job_attempt \
              "$ci_run_id" \
              "Rust (windows-latest)" \
              "Main CI run $ci_run_id"
          )"
          ci_artifact="$(
            select_artifact \
              "$ci_run_id" \
              "windows-release-candidate-$release_commit-attempt-$ci_job_attempt" \
              "Main CI run $ci_run_id"
          )"
          ci_artifact_id="$(jq -r '.id' <<< "$ci_artifact")"

          guide_response="$(mktemp)"
          trap 'rm -f "$guide_response"' EXIT
          curl --fail --silent --show-error --proto '=https' \
            --retry 30 --retry-delay 10 --retry-all-errors \
            --output "$guide_response" \
            "https://gamer-catch.pylot.dev/guide#quick-start"
          if ! grep --fixed-strings 'data-gamercatch-site="angular-guide"' "$guide_response" > /dev/null; then
            echo "The online GamerCatch guide is unavailable or is not the expected Angular site." >&2
            exit 1
          fi

          suspicious_files="$(git ls-files | grep -Ei '(^|/)(credentials?/.*\.json|[^/]*(service[-_]?account|gmail[-_]?oauth|oauth[-_]?client|gmail[-_]?token|credentials?)[^/]*\.json)$' || true)"
          if test -n "$suspicious_files"; then
            echo "Repository contains a possible service-account credential file." >&2
            printf '%s\n' "$suspicious_files" >&2
            exit 1
          fi
          while IFS= read -r json_file; do
            if grep -Eq '("type"[[:space:]]*:[[:space:]]*"service_account")|("(client_secret|private_key|refresh_token|access_token)"[[:space:]]*:[[:space:]]*"[^"]+")' "$json_file"; then
              echo "Tracked JSON looks like a Google credential or OAuth token: $json_file" >&2
              exit 1
            fi
          done < <(git ls-files '*.json')

          {
            echo "release_commit=$release_commit"
            echo "ci_run_id=$ci_run_id"
            echo "ci_artifact_id=$ci_artifact_id"
            echo "candidate_run_id=$candidate_run_id"
            echo "candidate_artifact_id=$candidate_artifact_id"
          } >> "$GITHUB_OUTPUT"

      - name: Upload Linux release packager
        id: upload_release_packager
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: linux-release-packager-${{ steps.source.outputs.release_commit }}-attempt-${{ github.run_attempt }}
          path: target/release-packager/release/gamercatch-release-packager
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          overwrite: false

      - name: Require Linux release packager artifact ID
        env:
          ARTIFACT_ID: ${{ steps.upload_release_packager.outputs.artifact-id }}
        run: |
          case "$ARTIFACT_ID" in
            '' | *[!0-9]*)
              echo "Linux release packager upload did not return a numeric artifact ID." >&2
              exit 1
              ;;
          esac
          test "$ARTIFACT_ID" -gt 0

  macos:
    name: Prepare signed macOS release candidate
    needs: verify-release-source
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 45
    environment: release
    outputs:
      artifact_id: ${{ steps.upload_candidate.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          ref: ${{ needs.verify-release-source.outputs.release_commit }}
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Prepare macOS package staging
        env:
          MACOS_PACKAGE_PHASE: prepare
        run: ./scripts/package-macos.sh

      - name: Configure Developer ID and Apple notarization
        shell: bash
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          CERTIFICATE_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          EXPECTED_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          required_values=(
            CERTIFICATE_P12_BASE64
            CERTIFICATE_P12_PASSWORD
            NOTARY_KEY_P8_BASE64
            NOTARY_KEY_ID
            NOTARY_ISSUER_ID
            EXPECTED_TEAM_ID
          )
          for value_name in "${required_values[@]}"; do
            if [[ -z "${!value_name:-}" ]]; then
              echo "Missing required release environment secret or variable: $value_name" >&2
              exit 1
            fi
          done
          if [[ ! "$NOTARY_KEY_ID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "APPLE_NOTARY_KEY_ID must be a 10-character Apple API Key ID." >&2
            exit 1
          fi
          if [[ ! "$NOTARY_ISSUER_ID" =~ ^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$ ]]; then
            echo "APPLE_NOTARY_ISSUER_ID must be a UUID." >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]; then
            echo "APPLE_TEAM_ID must be a 10-character Developer Team ID." >&2
            exit 1
          fi

          umask 077
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          notary_key_path="$RUNNER_TEMP/notary-api-key.p8"
          keychain_path="$RUNNER_TEMP/gamercatch-signing.keychain-db"
          {
            echo "MACOS_SIGNING_CERTIFICATE=$certificate_path"
            echo "MACOS_NOTARY_KEY_PATH=$notary_key_path"
            echo "MACOS_SIGNING_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$certificate_path"
          printf '%s' "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$notary_key_path"
          if [[ ! -s "$certificate_path" ]]; then
            echo "Decoded Developer ID certificate is empty." >&2
            exit 1
          fi
          if ! grep -F -- '-----BEGIN PRIVATE KEY-----' "$notary_key_path" >/dev/null; then
            echo "Decoded notarization API key is not an Apple .p8 private key." >&2
            exit 1
          fi

          keychain_password="$(openssl rand -hex 32)"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 1800 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -f pkcs12 \
            -P "$CERTIFICATE_P12_PASSWORD" \
            -x \
            -T /usr/bin/codesign
          rm -f "$certificate_path"

          private_key_lines="$(
            security find-key -t private -s "$keychain_path" 2>/dev/null || true
          )"
          private_key_count="$(
            printf '%s\n' "$private_key_lines" | grep -c '^keychain:' || true
          )"
          if [[ "$private_key_count" -ne 1 ]]; then
            echo "Developer ID PKCS#12 must contain exactly one signing private key; found $private_key_count." >&2
            exit 1
          fi

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          identity_lines="$(
            security find-identity -v -p codesigning "$keychain_path" |
              grep '"Developer ID Application:' || true
          )"
          identity_count="$(printf '%s\n' "$identity_lines" | grep -c 'Developer ID Application' || true)"
          if [[ "$identity_count" -ne 1 ]]; then
            echo "Expected exactly one Developer ID Application identity, found $identity_count." >&2
            exit 1
          fi
          sign_identity="$(printf '%s\n' "$identity_lines" | awk '{print $2}')"
          if [[ ! "$sign_identity" =~ ^[A-Fa-f0-9]{40}$ ]]; then
            echo "Imported Developer ID identity has an invalid fingerprint." >&2
            exit 1
          fi
          {
            echo "MACOS_SIGN_IDENTITY=$sign_identity"
            echo "MACOS_NOTARY_KEY_ID=$NOTARY_KEY_ID"
            echo "MACOS_NOTARY_ISSUER_ID=$NOTARY_ISSUER_ID"
            echo "MACOS_EXPECTED_TEAM_ID=$EXPECTED_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Sign, notarize, and package
        env:
          MACOS_PACKAGE_PHASE: finalize
        run: ./scripts/package-macos.sh

      - name: Remove signing credentials
        if: always()
        shell: bash
        run: |
          cleanup_failed=0
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" && -e "$MACOS_SIGNING_KEYCHAIN" ]]; then
            if ! security delete-keychain "$MACOS_SIGNING_KEYCHAIN"; then
              echo "Failed to delete the temporary signing keychain." >&2
              cleanup_failed=1
            fi
          fi
          for sensitive_path in \
            "${MACOS_SIGNING_CERTIFICATE:-}" \
            "${MACOS_NOTARY_KEY_PATH:-}"
          do
            if [[ -n "$sensitive_path" ]]; then
              if ! rm -f "$sensitive_path"; then
                echo "Failed to delete a temporary signing credential." >&2
                cleanup_failed=1
              fi
            fi
          done
          exit "$cleanup_failed"

      - name: Validate package
        run: >-
          ./target/release-packager/release/gamercatch-release-packager
          validate --platform macos dist/GamerCatch-macOS-arm64.zip

      - name: Upload signed macOS release candidate
        id: upload_candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: macos-release-candidate-${{ needs.verify-release-source.outputs.release_commit }}-attempt-${{ github.run_attempt }}
          path: dist/GamerCatch-macOS-arm64.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          overwrite: false

  audit-release-candidates:
    name: Audit reusable release candidates
    needs: [verify-release-source, macos]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          ref: ${{ needs.verify-release-source.outputs.release_commit }}
          persist-credentials: false

      - name: Require main has not moved
        run: |
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = \
            "${{ needs.verify-release-source.outputs.release_commit }}"

      - name: Download Linux release packager
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          artifact-ids: ${{ needs.verify-release-source.outputs.release_packager_artifact_id }}
          path: ${{ runner.temp }}/linux-release-packager
          digest-mismatch: error

      - name: Download signed macOS candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          artifact-ids: ${{ needs.macos.outputs.artifact_id }}
          path: downloaded-candidates/macos
          digest-mismatch: error

      - name: Download tested Windows candidate
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          artifact-ids: ${{ needs.verify-release-source.outputs.ci_artifact_id }}
          path: downloaded-candidates/windows
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.verify-release-source.outputs.ci_run_id }}
          digest-mismatch: error

      - name: Validate reusable candidates
        run: |
          tool_dir="$RUNNER_TEMP/linux-release-packager"
          packager="$tool_dir/gamercatch-release-packager"
          test "$(find "$tool_dir" -mindepth 1 -print | wc -l | tr -d ' ')" -eq 1
          test -f "$packager"
          test ! -L "$packager"
          test -s "$packager"
          chmod 0755 "$packager"
          test -x "$packager"
          test "$(find downloaded-candidates/macos -type f | wc -l | tr -d ' ')" -eq 1
          test "$(find downloaded-candidates/windows -type f | wc -l | tr -d ' ')" -eq 1
          test -s downloaded-candidates/macos/GamerCatch-macOS-arm64.zip
          test -s downloaded-candidates/windows/GamerCatch-Windows-x64.zip
          mkdir candidate-assets
          cp downloaded-candidates/macos/GamerCatch-macOS-arm64.zip candidate-assets/
          cp downloaded-candidates/windows/GamerCatch-Windows-x64.zip candidate-assets/
          "$packager" validate \
            --platform macos \
            candidate-assets/GamerCatch-macOS-arm64.zip
          "$packager" validate \
            --platform windows \
            candidate-assets/GamerCatch-Windows-x64.zip
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = \
            "${{ needs.verify-release-source.outputs.release_commit }}"

      - name: Upload reusable release candidates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: release-candidates-${{ needs.verify-release-source.outputs.release_commit }}-attempt-${{ github.run_attempt }}
          path: candidate-assets/*.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          overwrite: false

  publish:
    name: Publish GitHub release
    needs: verify-release-source
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          ref: ${{ needs.verify-release-source.outputs.release_commit }}
          persist-credentials: false

      - name: Download Linux release packager
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          artifact-ids: ${{ needs.verify-release-source.outputs.release_packager_artifact_id }}
          path: ${{ runner.temp }}/linux-release-packager
          digest-mismatch: error

      - name: Download audited release candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          artifact-ids: ${{ needs.verify-release-source.outputs.candidate_artifact_id }}
          path: release-ready
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.verify-release-source.outputs.candidate_run_id }}
          digest-mismatch: error

      - name: Validate release assets
        run: |
          tool_dir="$RUNNER_TEMP/linux-release-packager"
          packager="$tool_dir/gamercatch-release-packager"
          test "$(find "$tool_dir" -mindepth 1 -print | wc -l | tr -d ' ')" -eq 1
          test -f "$packager"
          test ! -L "$packager"
          test -s "$packager"
          chmod 0755 "$packager"
          test -x "$packager"
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = \
            "${{ needs.verify-release-source.outputs.release_commit }}"
          test "$(find release-ready -type f | wc -l | tr -d ' ')" -eq 2
          test -s release-ready/GamerCatch-macOS-arm64.zip
          test -s release-ready/GamerCatch-Windows-x64.zip
          "$packager" validate \
            --platform macos \
            release-ready/GamerCatch-macOS-arm64.zip
          "$packager" validate \
            --platform windows \
            release-ready/GamerCatch-Windows-x64.zip
          "$packager" checksums \
            --output release-ready/SHA256SUMS.txt \
            release-ready/GamerCatch-macOS-arm64.zip \
            release-ready/GamerCatch-Windows-x64.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main --no-tags
          test "$(git rev-parse origin/main)" = \
            "${{ needs.verify-release-source.outputs.release_commit }}"
          gh release create "$GITHUB_REF_NAME" \
            release-ready/GamerCatch-macOS-arm64.zip \
            release-ready/GamerCatch-Windows-x64.zip \
            release-ready/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "GamerCatch $GITHUB_REF_NAME（腳本版預覽）" \
            --notes-file "packaging/release-notes-$GITHUB_REF_NAME.md" \
            --latest \
            --verify-tag
