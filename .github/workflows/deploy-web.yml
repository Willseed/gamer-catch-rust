name: Web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy Angular
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0, Node.js 24
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --watch=false

      - name: Build
        run: npm run build:cloudflare

      - name: Deployment is disabled
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED != 'true' ||
            github.ref != 'refs/heads/main' ||
            (github.event_name != 'push' && github.event_name != 'workflow_dispatch')
          }}
        run: echo "Cloudflare deployment is disabled; the tested web build is retained only in this job."

      - name: Require Cloudflare credentials
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Missing CLOUDFLARE_ACCOUNT_ID GitHub Actions secret." >&2
            exit 1
          }
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Missing CLOUDFLARE_API_TOKEN GitHub Actions secret." >&2
            exit 1
          }
          test "$CLOUDFLARE_PAGES_PROJECT" = "gamer-catch" || {
            echo "CLOUDFLARE_PAGES_PROJECT must be gamer-catch." >&2
            exit 1
          }
          test "$SITE_DOMAIN" = "gamer.catch.pylot.dev" || {
            echo "SITE_DOMAIN must be gamer.catch.pylot.dev." >&2
            exit 1
          }

      - name: Ensure Cloudflare Pages project exists
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          response_file="$RUNNER_TEMP/cloudflare-project.json"
          endpoint="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PAGES_PROJECT"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "$endpoint")"

          if test "$status" = "404"; then
            create_endpoint="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects"
            create_body="$(jq --null-input \
              --arg name "$CLOUDFLARE_PAGES_PROJECT" \
              '{name: $name, production_branch: "main"}')"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$create_body" \
              "$create_endpoint")"
          fi

          if ! [[ "$status" =~ ^2[0-9][0-9]$ ]] ||
            ! jq --exit-status \
              --arg name "$CLOUDFLARE_PAGES_PROJECT" \
              '.success == true and .result.name == $name and
                .result.production_branch == "main"' \
              "$response_file" > /dev/null; then
            echo "Unable to find or create the expected Cloudflare Pages project with production branch main (HTTP $status)." >&2
            jq --raw-output '.errors[]?.message' "$response_file" >&2 || true
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: >-
          ./node_modules/.bin/wrangler pages deploy dist/cloudflare/browser
          --project-name="$CLOUDFLARE_PAGES_PROJECT"
          --branch=main
          --commit-hash=${{ github.sha }}

      - name: Attach custom domain
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        run: |
          response_file="$RUNNER_TEMP/cloudflare-domain.json"
          endpoint="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PAGES_PROJECT/domains/$SITE_DOMAIN"
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "$endpoint")"

          if test "$status" = "404"; then
            create_endpoint="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CLOUDFLARE_PAGES_PROJECT/domains"
            create_body="$(jq --null-input --arg name "$SITE_DOMAIN" '{name: $name}')"
            status="$(curl --silent --show-error \
              --output "$response_file" \
              --write-out '%{http_code}' \
              --request POST \
              --header "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              --header "Content-Type: application/json" \
              --data "$create_body" \
              "$create_endpoint")"
          fi

          if ! [[ "$status" =~ ^2[0-9][0-9]$ ]] ||
            ! jq --exit-status \
              --arg name "$SITE_DOMAIN" \
              '.success == true and .result.name == $name and
                (.result.status | IN("active", "initializing", "pending"))' \
              "$response_file" > /dev/null; then
            echo "Unable to attach the expected Pages custom domain (HTTP $status)." >&2
            echo "Resolve any existing A, AAAA, or CNAME conflict in Cloudflare DNS, then retry." >&2
            jq --raw-output '.errors[]?.message' "$response_file" >&2 || true
            exit 1
          fi

      - name: Smoke test custom domain
        if: >-
          ${{
            vars.CLOUDFLARE_DEPLOY_ENABLED == 'true' &&
            github.ref == 'refs/heads/main' &&
            (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
          }}
        env:
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
        working-directory: .
        run: |
          response_file="$RUNNER_TEMP/gamercatch-guide.html"
          curl --fail --silent --show-error --location \
            --retry 30 --retry-delay 10 --retry-all-errors \
            --output "$response_file" \
            "https://$SITE_DOMAIN/guide#quick-start"
          grep --fixed-strings 'data-gamercatch-site="angular-guide"' "$response_file" > /dev/null
