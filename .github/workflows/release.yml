name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify-release-source:
    name: Verify tag source and CI
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Require annotated tag at tested main HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = "tag"
          release_commit="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
          git fetch origin main --no-tags
          main_commit="$(git rev-parse origin/main)"
          if test "$release_commit" != "$main_commit"; then
            echo "Release tag must point at the current main HEAD." >&2
            exit 1
          fi

          package_version="$(cargo metadata --locked --no-deps --format-version 1 | python3 -c 'import json, sys; data=json.load(sys.stdin); print(data["packages"][0]["version"])')"
          if test "$GITHUB_REF_NAME" != "v$package_version"; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo version $package_version." >&2
            exit 1
          fi
          if test ! -f "packaging/release-notes-$GITHUB_REF_NAME.md"; then
            echo "Missing release notes for $GITHUB_REF_NAME." >&2
            exit 1
          fi

          successful_runs="$(gh api --method GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
            -f head_sha="$release_commit" \
            -f event=push \
            -f status=completed \
            -f per_page=100 \
            --jq '[.workflow_runs[] | select(.conclusion == "success" and .head_branch == "main")] | length')"
          if test "$successful_runs" -lt 1; then
            echo "No successful main push CI run exists for $release_commit." >&2
            exit 1
          fi

          suspicious_files="$(git ls-files | grep -Ei '(^|/)(credentials?/.*\.json|[^/]*service[-_]?account[^/]*\.json|[^/]*credentials?[^/]*\.json)$' || true)"
          if test -n "$suspicious_files"; then
            echo "Repository contains a possible service-account credential file." >&2
            printf '%s\n' "$suspicious_files" >&2
            exit 1
          fi
          while IFS= read -r json_file; do
            if grep -Eq '"type"[[:space:]]*:[[:space:]]*"service_account"' "$json_file"; then
              echo "Tracked JSON looks like a Google service-account key: $json_file" >&2
              exit 1
            fi
          done < <(git ls-files '*.json')

  macos:
    name: Package macOS arm64
    needs: verify-release-source
    runs-on: macos-15
    env:
      # Preview builds are intentionally unsigned until the repository has
      # Developer ID and notarytool secrets configured.
      ALLOW_UNSIGNED_MACOS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Build package
        run: ./scripts/package-macos.sh

      - name: Validate package
        run: python3 scripts/validate-package.py --platform macos dist/GamerCatch-macOS-arm64.zip

      - name: Upload macOS assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: macos-assets
          if-no-files-found: error
          path: |
            dist/GamerCatch-macOS-arm64.zip
            output/pdf/GamerCatch_零基礎使用手冊_macOS.pdf

  windows:
    name: Package Windows x64
    needs: verify-release-source
    runs-on: windows-latest
    env:
      # The owner does not yet have an Authenticode certificate. This makes
      # the unsigned preview decision explicit instead of silently falling back.
      ALLOW_UNSIGNED_WINDOWS: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Build package
        shell: pwsh
        run: .\scripts\package-windows.ps1

      - name: Validate package
        run: python scripts/validate-package.py --platform windows dist/GamerCatch-Windows-x64.zip

      - name: Upload Windows assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: windows-assets
          if-no-files-found: error
          path: |
            dist/GamerCatch-Windows-x64.zip
            output/pdf/GamerCatch_零基礎使用手冊_Windows.pdf

  publish:
    name: Publish GitHub prerelease
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Download packaged assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1, Node.js 24
        with:
          path: release-assets
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir release-ready
          for filename in \
            GamerCatch-macOS-arm64.zip \
            GamerCatch-Windows-x64.zip \
            GamerCatch_零基礎使用手冊_macOS.pdf \
            GamerCatch_零基礎使用手冊_Windows.pdf
          do
            match_count="$(find release-assets -type f -name "$filename" -print | awk 'END { print NR }')"
            if test "$match_count" -ne 1; then
              echo "Expected exactly one $filename, found $match_count." >&2
              exit 1
            fi
            source_path="$(find release-assets -type f -name "$filename" -print -quit)"
            cp "$source_path" "release-ready/$filename"
          done

      - name: Validate release assets
        run: |
          python3 scripts/validate-package.py --platform macos release-ready/GamerCatch-macOS-arm64.zip
          python3 scripts/validate-package.py --platform windows release-ready/GamerCatch-Windows-x64.zip
          test -s release-ready/GamerCatch_零基礎使用手冊_macOS.pdf
          test -s release-ready/GamerCatch_零基礎使用手冊_Windows.pdf
          cd release-ready
          sha256sum \
            GamerCatch-macOS-arm64.zip \
            GamerCatch-Windows-x64.zip \
            GamerCatch_零基礎使用手冊_macOS.pdf \
            GamerCatch_零基礎使用手冊_Windows.pdf \
            > SHA256SUMS.txt

      - name: Create GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-ready/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "GamerCatch $GITHUB_REF_NAME（腳本版預覽）" \
            --notes-file "packaging/release-notes-$GITHUB_REF_NAME.md" \
            --prerelease \
            --verify-tag
