# 請只修改引號內的文字、true/false 與數字，不要刪除欄位名稱。
schema_version = 2

[bahamut]
base_url = "https://forum.gamer.com.tw/"
# 30 = 手機排行榜；500 = PC 排行榜。整份設定中的啟用遊戲必須位於同一排行榜。
category = 30
# 程式只掃一次 page=1 到 page=20，同時尋找所有啟用的遊戲。
start_page = 1
end_page = 20
navigation_timeout_ms = 120000
page_delay_ms = 1000
# false 會顯示瀏覽器，遇到巴哈安全驗證時較可靠。
headless = false

# ===== Gmail 異常通知（選用） =====
# 完成 OAuth 設定與測試信前請保持 false；成功執行與 dry-run 都不會寄信。
[gmail_notifications]
enabled = false
# 必須與 Gmail 首次授權時登入的寄件帳號相同。
sender_email = "請填入寄件Gmail帳號"
# 可填多人，例如 ["owner@example.com", "backup@example.com"]。
default_recipients = ["請填入預設收件電子郵件"]
# 這是「電腦版應用程式」OAuth JSON，不是 Sheets service account JSON。
oauth_client_secret_path = "credentials/gmail-oauth-client.json"
# 通常不需要修改。
subject_prefix = "[GamerCatch]"

# ===== 遊戲 1 =====
[[games]]
enabled = true
game_name = "夜鴉"
# 全部資料確認正確後才改成 true；false 只抓取、不寫入。
write_to_google_sheets = false
# 可貼試算表網址，或只填網址 /d/ 與 /edit 之間的 ID。
spreadsheet_id = "請貼上第1人的Google試算表網址"
# 每個人可使用不同的 service account JSON。
service_account_key_path = "credentials/person-1-service-account.json"
worksheet_name = "每日排名"
timezone = "Asia/Taipei"
first_data_row = 2
date_column = "A"
rank_column = "B"
popularity_column = "C"
# 留空會使用 default_recipients；要只通知此遊戲的負責人就在中括號內填地址。
notification_recipients = []

# ===== 遊戲 2（需要時把 enabled 改成 true 並填完） =====
[[games]]
enabled = false
game_name = "請填入第二個遊戲名稱"
write_to_google_sheets = false
spreadsheet_id = "請貼上第2人的Google試算表網址"
service_account_key_path = "credentials/person-2-service-account.json"
worksheet_name = "每日排名"
timezone = "Asia/Taipei"
first_data_row = 2
date_column = "A"
rank_column = "B"
popularity_column = "C"
notification_recipients = []

# ===== 遊戲 3（需要時把 enabled 改成 true 並填完） =====
[[games]]
enabled = false
game_name = "請填入第三個遊戲名稱"
write_to_google_sheets = false
spreadsheet_id = "請貼上第3人的Google試算表網址"
service_account_key_path = "credentials/person-3-service-account.json"
worksheet_name = "每日排名"
timezone = "Asia/Taipei"
first_data_row = 2
date_column = "A"
rank_column = "B"
popularity_column = "C"
notification_recipients = []
