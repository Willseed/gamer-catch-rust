[package]
edition = "2024"
rust-version = "1.88"
name = "playwright-rs"
version = "0.14.1"
authors = ["Paul Adamson"]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Rust bindings for Microsoft Playwright"
readme = "README.md"
keywords = [
    "playwright",
    "browser",
    "automation",
    "testing",
    "e2e",
]
categories = [
    "development-tools::testing",
    "web-programming",
]
license = "Apache-2.0"
repository = "https://github.com/padamson/playwright-rust"
resolver = "2"

[package.metadata.docs.rs]
toolchain = "nightly-2025-05-01"

[features]
cli = [
    "dep:clap",
    "dep:ureq",
    "dep:zip",
    "dep:flate2",
    "dep:tar",
]
default = [
    "native-tls",
    "macros",
]
macros = ["dep:playwright-rs-macros"]
native-tls = ["tokio-tungstenite/native-tls"]
rustls-tls-native-roots = ["tokio-tungstenite/rustls-tls-native-roots"]
rustls-tls-webpki-roots = ["tokio-tungstenite/rustls-tls-webpki-roots"]
screenshot-diff = ["dep:image"]

[lib]
