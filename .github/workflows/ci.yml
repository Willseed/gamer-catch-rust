name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.88.0

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --locked --all-targets

      - name: Test
        run: cargo test --locked --all-targets

      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Validate Windows PowerShell 5.1 scripts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Get-ChildItem '.\scripts\*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Test daily scheduled task registration and execution
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $identity = [System.Security.Principal.WindowsIdentity]::GetCurrent()
          $windowsPrincipal = New-Object System.Security.Principal.WindowsPrincipal($identity)
          $runnerIsAdministrator = $windowsPrincipal.IsInRole(
            [System.Security.Principal.WindowsBuiltInRole]::Administrator
          )
          Write-Host "GitHub runner token is administrator: $runnerIsAdministrator"
          Write-Host 'The task itself is still asserted as Interactive and Limited.'
          $taskName = "GamerCatch-Daily-0900-$($identity.User.Value)"
          $testRoot = Join-Path $env:RUNNER_TEMP 'GamerCatch path with spaces & (test)'
          $installer = Join-Path $testRoot 'install-windows-task.ps1'
          $entry = Join-Path $testRoot 'schedule.cmd'
          $cmdOutputPath = Join-Path $testRoot 'cmd-output.txt'
          $runnerEntry = Join-Path $testRoot 'runner.cmd'
          $runnerOutputPath = Join-Path $testRoot 'runner-output.txt'
          try {
            New-Item -ItemType Directory -Path $testRoot | Out-Null
            New-Item -ItemType Directory -Path (Join-Path $testRoot 'credentials') | Out-Null
            New-Item -ItemType Directory -Path (Join-Path $testRoot 'playwright-driver\package') | Out-Null
            $fakeSource = @'
          using System;
          public static class FakeGamerCatch {
              public static int Main(string[] args) {
                  Console.WriteLine("scheduled-test");
                  if (args.Length == 2 && args[0] == "--config" && args[1].EndsWith("config.toml")) {
                      return 7;
                  }
                  return 8;
              }
          }
          '@
            Add-Type -TypeDefinition $fakeSource `
              -OutputAssembly (Join-Path $testRoot 'GamerCatch.exe') `
              -OutputType ConsoleApplication
            Set-Content -LiteralPath (Join-Path $testRoot 'config.toml') -Value 'schema_version = 2'
            Set-Content -LiteralPath (Join-Path $testRoot 'playwright-driver\node.exe') -Value 'test'
            Set-Content -LiteralPath (Join-Path $testRoot 'playwright-driver\package\cli.js') -Value 'test'
            Copy-Item -LiteralPath '.\scripts\install-windows-task.ps1' -Destination $installer
            $entrySource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter '3_*.cmd')
            $runnerSource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter '2_*.cmd')
            if ($entrySource.Count -ne 1 -or $runnerSource.Count -ne 1) {
              throw 'Expected exactly one numbered CMD source for the runner and scheduler.'
            }
            Copy-Item -LiteralPath $entrySource[0].FullName -Destination $entry
            Copy-Item -LiteralPath $runnerSource[0].FullName -Destination $runnerEntry

            $windowsPowerShell = Join-Path $PSHOME 'powershell.exe'
            $utf8Strict = New-Object System.Text.UTF8Encoding($false, $true)
            $runnerExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('5pyJ6aCF55uu5pyq5a6M5oiQ77yM6KuL5p+l55yL5LiK5pa56Yyv6Kqk6KiK5oGv5oiWIGxhc3QtcnVuLmxvZ+OAgg==')
            )
            $installExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('5a6J6KOd5oiQ5Yqf44CC5LiN6ZyA6KaB57O757Wx566h55CG5ZOh5qyK6ZmQ77yM5Lmf5LiN5pyD5YSy5a2YIFdpbmRvd3Mg5a+G56K844CC')
            )
            $updateExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('6YeN5paw6ZuZ5pOK5pys5qqU5qGI5pyD5pu05paw5Y6f5pys55qE5o6S56iL77yM5LiN5pyD5bu656uL6YeN6KSH5bel5L2c44CC')
            )
            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "runner.cmd" --no-pause < nul > runner-output.txt 2>&1'
              $runnerExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($runnerExitCode -ne 7) {
              throw "The double-click runner returned $runnerExitCode instead of 7."
            }
            $runnerOutput = $utf8Strict.GetString([System.IO.File]::ReadAllBytes($runnerOutputPath))
            if ($runnerOutput.Contains([char]0xFFFD) -or
                $runnerOutput -match '(?i)is not recognized as an internal or external command') {
              throw "The double-click runner produced corrupt output: $runnerOutput"
            }
            if (-not $runnerOutput.Contains($runnerExpected)) {
              throw "The double-click runner omitted its Traditional Chinese failure output: $runnerOutput"
            }
            Write-Output $runnerOutput

            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "schedule.cmd" --no-pause < nul > cmd-output.txt 2>&1'
              $cmdExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($cmdExitCode -ne 0) {
              throw "The double-click CMD installer failed with exit code $cmdExitCode."
            }
            $cmdOutput = $utf8Strict.GetString([System.IO.File]::ReadAllBytes($cmdOutputPath))
            if ($cmdOutput.Contains([char]0xFFFD) -or
                $cmdOutput -match '(?i)is not recognized as an internal or external command') {
              throw "The double-click CMD installer produced corrupt output: $cmdOutput"
            }
            if (-not $cmdOutput.Contains($installExpected) -or
                -not $cmdOutput.Contains($updateExpected)) {
              throw "The double-click CMD installer omitted its Traditional Chinese success output: $cmdOutput"
            }
            Write-Output $cmdOutput

            & $windowsPowerShell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $installer
            if ($LASTEXITCODE -ne 0) {
              throw "Repeated installer run failed with exit code $LASTEXITCODE."
            }
            $scheduledLog = Join-Path $testRoot 'last-scheduled-run.log'
            if (Test-Path -LiteralPath $scheduledLog) {
              throw 'Installing the task unexpectedly ran GamerCatch immediately.'
            }

            $tasks = @(Get-ScheduledTask -TaskName $taskName -TaskPath '\')
            if ($tasks.Count -ne 1) {
              throw "Expected one idempotent scheduled task, found $($tasks.Count)."
            }
            $task = $tasks[0]
            $info = Get-ScheduledTaskInfo -TaskName $taskName -TaskPath '\'
            $action = @($task.Actions)[0]
            $trigger = @($task.Triggers)[0]
            if ([string]$task.Principal.LogonType -ne 'Interactive' -or
                [string]$task.Principal.RunLevel -ne 'Limited') {
              throw 'The task principal is not Interactive and Limited.'
            }
            $expectedFileArgument = '-File "{0}" -ScheduledRun' -f $installer
            if ($action.Execute -ne $windowsPowerShell -or
                $action.WorkingDirectory -ne $testRoot -or
                -not $action.Arguments.Contains($expectedFileArgument)) {
              throw "The task action does not preserve the exact package path: $($action | Out-String)"
            }
            $start = [datetime]$trigger.StartBoundary
            if ($start -le (Get-Date) -or $start.Hour -ne 9 -or $start.Minute -ne 0) {
              throw "The next trigger is not the next local 09:00: $start"
            }
            if (-not $task.Settings.StartWhenAvailable -or
                -not $task.Settings.WakeToRun -or
                -not $task.Settings.RunOnlyIfNetworkAvailable -or
                $task.Settings.DisallowStartIfOnBatteries -or
                $task.Settings.StopIfGoingOnBatteries -or
                [string]$task.Settings.MultipleInstances -ne 'IgnoreNew') {
              throw "The task settings are incomplete: $($task.Settings | Out-String)"
            }
            if ($info.NextRunTime -le (Get-Date) -or $info.NextRunTime.Hour -ne 9) {
              throw "Task Scheduler did not retain the next local 09:00 run: $($info.NextRunTime)"
            }

            & $windowsPowerShell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $installer -ScheduledRun
            $directExitCode = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            if ($directExitCode -ne 7) {
              throw "Scheduled mode did not preserve the fake executable exit code: $directExitCode"
            }
            $logText = Get-Content -LiteralPath $scheduledLog -Raw -Encoding UTF8
            if (-not $logText.Contains('scheduled-test') -or
                -not $logText.Contains('Exit code: 7')) {
              throw "Scheduled mode did not capture output and exit code: $logText"
            }

            Remove-Item -LiteralPath $scheduledLog -Force
            $schedulerStart = Get-Date
            Start-ScheduledTask -TaskName $taskName -TaskPath '\'
            $deadline = (Get-Date).AddSeconds(60)
            do {
              Start-Sleep -Milliseconds 500
              $task = Get-ScheduledTask -TaskName $taskName -TaskPath '\'
              $info = Get-ScheduledTaskInfo -TaskName $taskName -TaskPath '\'
              $schedulerFinished = (
                (Test-Path -LiteralPath $scheduledLog) -and
                $task.State -ne 'Running'
              )
            } while (-not $schedulerFinished -and (Get-Date) -lt $deadline)

            if (-not $schedulerFinished) {
              throw "Task Scheduler did not finish the action within 60 seconds: $($task | Out-String)"
            }
            if ($info.LastRunTime -lt $schedulerStart.AddSeconds(-2) -or
                $info.LastTaskResult -ne 7) {
              throw "Task Scheduler did not preserve the real action result: $($info | Out-String)"
            }
            $schedulerLogText = Get-Content -LiteralPath $scheduledLog -Raw -Encoding UTF8
            if (-not $schedulerLogText.Contains('scheduled-test') -or
                -not $schedulerLogText.Contains('Exit code: 7')) {
              throw "The registered Task Scheduler action did not write the expected log: $schedulerLogText"
            }
            Write-Output 'The registered Task Scheduler action completed with exit code 7 as expected.'
          }
          finally {
            Unregister-ScheduledTask -TaskName $taskName -TaskPath '\' -Confirm:$false -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $testRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

  docs-and-scripts:
    name: PDF and scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Validate scripts
        run: |
          bash -n scripts/package-macos.sh scripts/*.command scripts/*.sh
          shellcheck scripts/package-macos.sh scripts/*.command scripts/*.sh
          python3 -m py_compile scripts/generate-manual.py scripts/create-release-zip.py scripts/validate-package.py

      - name: Validate PDF manuals
        run: |
          if ! command -v pdfinfo >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y poppler-utils
          fi
          manual_version="$(cargo metadata --locked --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          test "$(pdfinfo output/pdf/GamerCatch_零基礎使用手冊_macOS.pdf | awk '/^Pages:/ { print $2 }')" = "18"
          test "$(pdfinfo output/pdf/GamerCatch_零基礎使用手冊_Windows.pdf | awk '/^Pages:/ { print $2 }')" = "19"
          for manual in output/pdf/*.pdf; do
            pdftotext "$manual" - | grep -F "零基礎設定與操作手冊"
            pdftotext "$manual" - | grep -F "版本 $manual_version"
            pdftotext "$manual" - | grep -F "service account"
            pdftotext "$manual" - | grep -F "更換遊戲時要修改與確認什麼"
          done
          if pdftotext output/pdf/GamerCatch_零基礎使用手冊_macOS.pdf - | grep -F ".ps1"; then
            echo "macOS manual must not contain Windows PowerShell instructions." >&2
            exit 1
          fi
          pdftotext output/pdf/GamerCatch_零基礎使用手冊_Windows.pdf - | grep -F "每天 09:00 自動抓取"
          pdftotext output/pdf/GamerCatch_零基礎使用手冊_Windows.pdf - | grep -F "3_安裝每天早上9點自動抓取.cmd"

      - name: Reject committed credentials
        run: |
          suspicious_files="$(git ls-files | grep -Ei '(^|/)(credentials?/.*\.json|[^/]*service[-_]?account[^/]*\.json|[^/]*credentials?[^/]*\.json)$' || true)"
          if test -n "$suspicious_files"; then
            echo "Repository contains a possible service-account credential file." >&2
            printf '%s\n' "$suspicious_files" >&2
            exit 1
          fi
          while IFS= read -r json_file; do
            if grep -Eq '"type"[[:space:]]*:[[:space:]]*"service_account"' "$json_file"; then
              echo "Tracked JSON looks like a Google service-account key: $json_file" >&2
              exit 1
            fi
          done < <(git ls-files '*.json')
