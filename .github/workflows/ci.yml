name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  PLAYWRIGHT_SKIP_DRIVER_DOWNLOAD: "1"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        run: |
          rustup toolchain install 1.88.0 --profile minimal --component rustfmt --component clippy
          rustup default 1.88.0

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --locked --workspace --all-targets

      - name: Test
        run: cargo test --locked --workspace --all-targets

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Validate Windows PowerShell 5.1 scripts
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Get-ChildItem '.\scripts\*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error $_ }
              exit 1
            }
          }

      - name: Test daily scheduled task registration and execution
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $identity = [System.Security.Principal.WindowsIdentity]::GetCurrent()
          $windowsPrincipal = New-Object System.Security.Principal.WindowsPrincipal($identity)
          $runnerIsAdministrator = $windowsPrincipal.IsInRole(
            [System.Security.Principal.WindowsBuiltInRole]::Administrator
          )
          Write-Host "GitHub runner token is administrator: $runnerIsAdministrator"
          Write-Host 'The task itself is still asserted as Interactive and Limited.'
          $taskName = "GamerCatch-Daily-0900-$($identity.User.Value)"
          $testRoot = Join-Path $env:RUNNER_TEMP 'GamerCatch path with spaces & (test)'
          $installer = Join-Path $testRoot 'install-windows-task.ps1'
          $entry = Join-Path $testRoot 'schedule.cmd'
          $cmdOutputPath = Join-Path $testRoot 'cmd-output.txt'
          $runnerEntry = Join-Path $testRoot 'runner.cmd'
          $runnerOutputPath = Join-Path $testRoot 'runner-output.txt'
          $gmailEntry = Join-Path $testRoot 'gmail.cmd'
          $gmailOutputPath = Join-Path $testRoot 'gmail-output.txt'
          $starterEntry = Join-Path $testRoot 'starter.cmd'
          $starterOutputPath = Join-Path $testRoot 'starter-output.txt'
          try {
            New-Item -ItemType Directory -Path $testRoot | Out-Null
            New-Item -ItemType Directory -Path (Join-Path $testRoot 'credentials') | Out-Null
            New-Item -ItemType Directory -Path (Join-Path $testRoot 'playwright-driver\package') | Out-Null
            Copy-Item -LiteralPath '.\config.example.toml' -Destination $testRoot
            $fakeSource = @'
          using System;
          public static class FakeGamerCatch {
              public static int Main(string[] args) {
                  Console.WriteLine("scheduled-test");
                  if (args.Length == 1 && args[0] == "--install-browser") {
                      return 0;
                  }
                  if (args.Length == 2 && args[0] == "--config" && args[1].EndsWith("config.toml")) {
                      return 7;
                  }
                  if (args.Length == 3 && args[0] == "--config" && args[1].EndsWith("config.toml") && args[2] == "--authorize-gmail") {
                      return 9;
                  }
                  return 8;
              }
          }
          '@
            Add-Type -TypeDefinition $fakeSource `
              -OutputAssembly (Join-Path $testRoot 'GamerCatch.exe') `
              -OutputType ConsoleApplication
            $configPath = Join-Path $testRoot 'config.toml'
            [System.IO.File]::WriteAllBytes(
              $configPath,
              [System.Text.Encoding]::UTF8.GetBytes("schema_version = 2`n# keep-user-config")
            )
            $configHashBefore = (Get-FileHash -LiteralPath $configPath -Algorithm SHA256).Hash
            Set-Content -LiteralPath (Join-Path $testRoot 'playwright-driver\node.exe') -Value 'test'
            Set-Content -LiteralPath (Join-Path $testRoot 'playwright-driver\package\cli.js') -Value 'test'
            Copy-Item -LiteralPath '.\scripts\install-windows-task.ps1' -Destination $installer
            $entrySource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter '3_*.cmd')
            $starterSource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter '1_*.cmd')
            $runnerSource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter '2_*.cmd')
            $gmailSource = @(Get-ChildItem -LiteralPath '.\scripts' -Filter 'Gmail_*.cmd')
            if ($entrySource.Count -ne 1 -or $starterSource.Count -ne 1 -or
                $runnerSource.Count -ne 1 -or $gmailSource.Count -ne 1) {
              throw 'Expected exactly one starter, runner, scheduler, and Gmail authorizer CMD source.'
            }
            Copy-Item -LiteralPath $entrySource[0].FullName -Destination $entry
            Copy-Item -LiteralPath $starterSource[0].FullName -Destination $starterEntry
            Copy-Item -LiteralPath $runnerSource[0].FullName -Destination $runnerEntry
            Copy-Item -LiteralPath $gmailSource[0].FullName -Destination $gmailEntry

            $windowsPowerShell = Join-Path $PSHOME 'powershell.exe'
            $utf8Strict = New-Object System.Text.UTF8Encoding($false, $true)
            $runnerExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('5pyJ6aCF55uu5pyq5a6M5oiQ77yM6KuL5p+l55yL5LiK5pa56Yyv6Kqk6KiK5oGv5oiWIGxhc3QtcnVuLmxvZ+OAgg==')
            )
            $installExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('5a6J6KOd5oiQ5Yqf44CC5LiN6ZyA6KaB57O757Wx566h55CG5ZOh5qyK6ZmQ77yM5Lmf5LiN5pyD5YSy5a2YIFdpbmRvd3Mg5a+G56K844CC')
            )
            $updateExpected = [System.Text.Encoding]::UTF8.GetString(
              [System.Convert]::FromBase64String('6YeN5paw6ZuZ5pOK5pys5qqU5qGI5pyD5pu05paw5Y6f5pys55qE5o6S56iL77yM5LiN5pyD5bu656uL6YeN6KSH5bel5L2c44CC')
            )
            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "runner.cmd" --no-pause < nul > runner-output.txt 2>&1'
              $runnerExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($runnerExitCode -ne 7) {
              throw "The double-click runner returned $runnerExitCode instead of 7."
            }
            $runnerOutput = $utf8Strict.GetString([System.IO.File]::ReadAllBytes($runnerOutputPath))
            if ($runnerOutput.Contains([char]0xFFFD) -or
                $runnerOutput -match '(?i)is not recognized as an internal or external command') {
              throw "The double-click runner produced corrupt output: $runnerOutput"
            }
            if (-not $runnerOutput.Contains($runnerExpected)) {
              throw "The double-click runner omitted its Traditional Chinese failure output: $runnerOutput"
            }
            Write-Output $runnerOutput

            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "gmail.cmd" --no-pause < nul > gmail-output.txt 2>&1'
              $gmailExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($gmailExitCode -ne 9) {
              throw "The Gmail authorizer returned $gmailExitCode instead of 9."
            }
            $gmailOutput = $utf8Strict.GetString([System.IO.File]::ReadAllBytes($gmailOutputPath))
            if ($gmailOutput.Contains([char]0xFFFD) -or
                $gmailOutput -match '(?i)is not recognized as an internal or external command') {
              throw "The Gmail authorizer produced corrupt output: $gmailOutput"
            }
            if (-not $gmailOutput.Contains('last-gmail-authorization.log')) {
              throw "The Gmail authorizer omitted its failure log guidance: $gmailOutput"
            }
            Write-Output $gmailOutput

            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "starter.cmd" --no-open --no-pause < nul > starter-output.txt 2>&1'
              $starterExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($starterExitCode -ne 0) {
              throw "The first-setup launcher failed with exit code $starterExitCode."
            }
            $starterOutput = $utf8Strict.GetString(
              [System.IO.File]::ReadAllBytes($starterOutputPath)
            )
            if ($starterOutput.Contains([char]0xFFFD)) {
              throw "The first-setup launcher produced corrupt output: $starterOutput"
            }

            $configHashAfter = (Get-FileHash -LiteralPath $configPath -Algorithm SHA256).Hash
            if ($configHashAfter -ne $configHashBefore) {
              throw 'A first-setup, runner, or Gmail launcher modified the existing config.toml.'
            }

            $preservedConfigPath = Join-Path $testRoot 'preserved-config.toml'
            $missingRunnerOutputPath = Join-Path $testRoot 'missing-runner-output.txt'
            $missingGmailOutputPath = Join-Path $testRoot 'missing-gmail-output.txt'
            Move-Item -LiteralPath $configPath -Destination $preservedConfigPath
            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "starter.cmd" --no-open --no-pause < nul > missing-starter-output.txt 2>&1'
              $missingStarterExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
              & $env:ComSpec /D /C 'call "runner.cmd" --no-pause < nul > missing-runner-output.txt 2>&1'
              $missingRunnerExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
              & $env:ComSpec /D /C 'call "gmail.cmd" --no-pause < nul > missing-gmail-output.txt 2>&1'
              $missingGmailExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($missingStarterExitCode -ne 0 -or $missingRunnerExitCode -ne 1 -or
                $missingGmailExitCode -ne 1) {
              throw "Missing config launcher exits were unexpected: starter=$missingStarterExitCode runner=$missingRunnerExitCode gmail=$missingGmailExitCode"
            }
            if (Test-Path -LiteralPath $configPath) {
              throw 'A launcher unexpectedly created config.toml when it was missing.'
            }
            $missingRunnerOutput = $utf8Strict.GetString(
              [System.IO.File]::ReadAllBytes($missingRunnerOutputPath)
            )
            $missingGmailOutput = $utf8Strict.GetString(
              [System.IO.File]::ReadAllBytes($missingGmailOutputPath)
            )
            $generatorUrl = 'https://gamer-catch.pylot.dev/generator'
            if (-not $missingRunnerOutput.Contains($generatorUrl) -or
                -not $missingGmailOutput.Contains($generatorUrl)) {
              throw 'Missing config guidance must link to the configuration generator.'
            }
            Move-Item -LiteralPath $preservedConfigPath -Destination $configPath

            Push-Location $testRoot
            try {
              & $env:ComSpec /D /C 'call "schedule.cmd" --no-pause < nul > cmd-output.txt 2>&1'
              $cmdExitCode = $LASTEXITCODE
              $global:LASTEXITCODE = 0
            }
            finally {
              Pop-Location
            }
            if ($cmdExitCode -ne 0) {
              throw "The double-click CMD installer failed with exit code $cmdExitCode."
            }
            $cmdOutput = $utf8Strict.GetString([System.IO.File]::ReadAllBytes($cmdOutputPath))
            if ($cmdOutput.Contains([char]0xFFFD) -or
                $cmdOutput -match '(?i)is not recognized as an internal or external command') {
              throw "The double-click CMD installer produced corrupt output: $cmdOutput"
            }
            if (-not $cmdOutput.Contains($installExpected) -or
                -not $cmdOutput.Contains($updateExpected)) {
              throw "The double-click CMD installer omitted its Traditional Chinese success output: $cmdOutput"
            }
            Write-Output $cmdOutput

            & $windowsPowerShell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $installer
            if ($LASTEXITCODE -ne 0) {
              throw "Repeated installer run failed with exit code $LASTEXITCODE."
            }
            $scheduledLog = Join-Path $testRoot 'last-scheduled-run.log'
            if (Test-Path -LiteralPath $scheduledLog) {
              throw 'Installing the task unexpectedly ran GamerCatch immediately.'
            }

            $tasks = @(Get-ScheduledTask -TaskName $taskName -TaskPath '\')
            if ($tasks.Count -ne 1) {
              throw "Expected one idempotent scheduled task, found $($tasks.Count)."
            }
            $task = $tasks[0]
            $info = Get-ScheduledTaskInfo -TaskName $taskName -TaskPath '\'
            $action = @($task.Actions)[0]
            $trigger = @($task.Triggers)[0]
            if ([string]$task.Principal.LogonType -ne 'Interactive' -or
                [string]$task.Principal.RunLevel -ne 'Limited') {
              throw 'The task principal is not Interactive and Limited.'
            }
            $expectedFileArgument = '-File "{0}" -ScheduledRun' -f $installer
            if ($action.Execute -ne $windowsPowerShell -or
                $action.WorkingDirectory -ne $testRoot -or
                -not $action.Arguments.Contains($expectedFileArgument)) {
              throw "The task action does not preserve the exact package path: $($action | Out-String)"
            }
            $start = [datetime]$trigger.StartBoundary
            if ($start -le (Get-Date) -or $start.Hour -ne 9 -or $start.Minute -ne 0) {
              throw "The next trigger is not the next local 09:00: $start"
            }
            if (-not $task.Settings.StartWhenAvailable -or
                -not $task.Settings.WakeToRun -or
                -not $task.Settings.RunOnlyIfNetworkAvailable -or
                $task.Settings.DisallowStartIfOnBatteries -or
                $task.Settings.StopIfGoingOnBatteries -or
                [string]$task.Settings.MultipleInstances -ne 'IgnoreNew') {
              throw "The task settings are incomplete: $($task.Settings | Out-String)"
            }
            if ($info.NextRunTime -le (Get-Date) -or $info.NextRunTime.Hour -ne 9) {
              throw "Task Scheduler did not retain the next local 09:00 run: $($info.NextRunTime)"
            }

            & $windowsPowerShell -NoLogo -NoProfile -NonInteractive -ExecutionPolicy Bypass -File $installer -ScheduledRun
            $directExitCode = $LASTEXITCODE
            $global:LASTEXITCODE = 0
            if ($directExitCode -ne 7) {
              throw "Scheduled mode did not preserve the fake executable exit code: $directExitCode"
            }
            $logText = Get-Content -LiteralPath $scheduledLog -Raw -Encoding UTF8
            if (-not $logText.Contains('scheduled-test') -or
                -not $logText.Contains('Exit code: 7')) {
              throw "Scheduled mode did not capture output and exit code: $logText"
            }

            Remove-Item -LiteralPath $scheduledLog -Force
            $schedulerStart = Get-Date
            Start-ScheduledTask -TaskName $taskName -TaskPath '\'
            $deadline = (Get-Date).AddSeconds(60)
            do {
              Start-Sleep -Milliseconds 500
              $task = Get-ScheduledTask -TaskName $taskName -TaskPath '\'
              $info = Get-ScheduledTaskInfo -TaskName $taskName -TaskPath '\'
              $schedulerFinished = (
                (Test-Path -LiteralPath $scheduledLog) -and
                $task.State -ne 'Running'
              )
            } while (-not $schedulerFinished -and (Get-Date) -lt $deadline)

            if (-not $schedulerFinished) {
              throw "Task Scheduler did not finish the action within 60 seconds: $($task | Out-String)"
            }
            if ($info.LastRunTime -lt $schedulerStart.AddSeconds(-2) -or
                $info.LastTaskResult -ne 7) {
              throw "Task Scheduler did not preserve the real action result: $($info | Out-String)"
            }
            $schedulerLogText = Get-Content -LiteralPath $scheduledLog -Raw -Encoding UTF8
            if (-not $schedulerLogText.Contains('scheduled-test') -or
                -not $schedulerLogText.Contains('Exit code: 7')) {
              throw "The registered Task Scheduler action did not write the expected log: $schedulerLogText"
            }
            Write-Output 'The registered Task Scheduler action completed with exit code 7 as expected.'
          }
          finally {
            Unregister-ScheduledTask -TaskName $taskName -TaskPath '\' -Confirm:$false -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $testRoot -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Build and validate Windows release package
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ALLOW_UNSIGNED_WINDOWS: "1"
        run: |
          .\scripts\package-windows.ps1
          .\target\release-packager\release\gamercatch-release-packager.exe `
            validate --platform windows dist\GamerCatch-Windows-x64.zip

      - name: Upload tested Windows release candidate
        if: >-
          runner.os == 'Windows' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1, Node.js 24
        with:
          name: windows-release-candidate-${{ github.sha }}-attempt-${{ github.run_attempt }}
          path: dist/GamerCatch-Windows-x64.zip
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          overwrite: false

  web:
    name: Angular 22 (Node.js 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0, Node.js 24
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install exact dependencies
        run: npm ci --ignore-scripts

      - name: Test configuration generator and pages
        run: npm run test:ci

      - name: Build Cloudflare Pages site
        run: npm run build:cloudflare

  docs-and-scripts:
    name: Scripts and online-guide policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1, Node.js 24
        with:
          persist-credentials: false

      - name: Validate scripts
        run: |
          bash -n scripts/package-macos.sh scripts/*.command scripts/*.sh
          shellcheck scripts/package-macos.sh scripts/*.command scripts/*.sh

      - name: Require Rust-only release packaging
        run: |
          tracked_python="$(git ls-files '*.py')"
          if test -n "$tracked_python"; then
            echo 'Release packaging must not depend on tracked Python files.' >&2
            printf '%s\n' "$tracked_python" >&2
            exit 1
          fi
          if git grep -En '(^|[[:space:]])python(3)?([[:space:]]|$)' -- \
            scripts/package-macos.sh \
            scripts/package-windows.ps1 \
            .github/workflows/release.yml
          then
            echo 'Release packaging must invoke the Rust packager instead of Python.' >&2
            exit 1
          fi
          for marker in \
            'gamercatch-release-packager' \
            'create-zip' \
            'validate --platform' \
            'notary-submission' \
            'notary-issue-count' \
            'checksums'
          do
            git grep -F "$marker" -- \
              scripts/package-macos.sh \
              scripts/package-windows.ps1 \
              .github/workflows/release.yml >/dev/null
          done

      - name: Require signed and notarized macOS releases
        run: |
          if grep -F 'ALLOW_UNSIGNED_MACOS' .github/workflows/release.yml; then
            echo 'Release workflow must never opt into unsigned macOS packages.' >&2
            exit 1
          fi
          if grep -F 'ALLOW_UNNOTARIZED_MACOS' .github/workflows/release.yml; then
            echo 'Release workflow must never opt into unnotarized macOS packages.' >&2
            exit 1
          fi
          for marker in \
            'workflow_dispatch:' \
            'environment: release' \
            'MACOS_DEVELOPER_ID_P12_BASE64' \
            'MACOS_DEVELOPER_ID_P12_PASSWORD' \
            'APPLE_NOTARY_KEY_P8_BASE64' \
            'APPLE_NOTARY_KEY_ID' \
            'APPLE_NOTARY_ISSUER_ID' \
            'APPLE_TEAM_ID' \
            'security find-key -t private -s' \
            'security set-key-partition-list' \
            'Remove signing credentials' \
            "if: github.event_name == 'push'"
          do
            grep -F "$marker" .github/workflows/release.yml >/dev/null
          done
          for marker in \
            'Authority=Developer ID Application:' \
            'flags=.*\(runtime\)' \
            'Timestamp=' \
            'PENDING_ZIP=' \
            'notary-submission' \
            'notary-issue-count' \
            'submit_for_notarization' \
            'mv --' \
            'Apple notarization Accepted，log issues=0'
          do
            grep -F "$marker" scripts/package-macos.sh >/dev/null
          done
          grep -F 'is_uuid' tools/release-packager/src/notary.rs >/dev/null

      - name: Require immutable release candidate reuse
        run: |
          ruby -ryaml <<'RUBY'
          workflow = YAML.load_file('.github/workflows/ci.yml')
          rust_job = workflow.fetch('jobs').fetch('rust')
          steps = rust_job.fetch('steps')
          build_name = 'Build and validate Windows release package'
          upload_name = 'Upload tested Windows release candidate'
          build_indexes = steps.each_index.select { |index| steps[index]['name'] == build_name }
          upload_indexes = steps.each_index.select { |index| steps[index]['name'] == upload_name }
          expression = '$' + '{{'
          expected_upload = {
            'name' => upload_name,
            'if' => "runner.os == 'Windows' && github.event_name == 'push' && github.ref == 'refs/heads/main'",
            'uses' => 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a',
            'with' => {
              'name' => "windows-release-candidate-#{expression} github.sha }}-attempt-#{expression} github.run_attempt }}",
              'path' => 'dist/GamerCatch-Windows-x64.zip',
              'if-no-files-found' => 'error',
              'retention-days' => 14,
              'compression-level' => 0,
              'overwrite' => false
            }
          }
          unless build_indexes.length == 1 && upload_indexes.length == 1 &&
                 upload_indexes.first == build_indexes.first + 1 &&
                 steps.fetch(upload_indexes.first) == expected_upload
            abort 'The Windows candidate upload must remain the exact next fail-closed step after package validation.'
          end

          require 'digest'
          require 'json'
          release_workflow = YAML.load_file('.github/workflows/release.yml')
          release_jobs = release_workflow.fetch('jobs')
          canonicalize = lambda do |value|
            case value
            when Hash
              value.keys.sort.each_with_object({}) do |key, result|
                result[key] = canonicalize.call(value[key])
              end
            when Array
              value.map { |item| canonicalize.call(item) }
            else
              value
            end
          end
          expected_release_job_digests = {
            'verify-release-source' => 'fb55bd5eaa5df2a14f060a0acf5fb70ca7d766067aff35c3e33c0c72e2b013f5',
            'macos' => 'fe993360b7459a2153b04c53528ecdf0c1a0de9074c7345f51e8f768fd976818',
            'audit-release-candidates' => '7be065af9c84c6fa0b760adf6cb7769f5bd3af695b78e7993064ae1f36cf5093',
            'publish' => 'e78983bdd2590e44394fe5c0a2cd292c5dc10a6ecdaa1ce8c95575a19d8ac7ef'
          }
          actual_release_job_digests = release_jobs.to_h do |job_name, job|
            canonical_job = JSON.generate(canonicalize.call(job))
            [job_name, Digest::SHA256.hexdigest(canonical_job)]
          end
          unless actual_release_job_digests == expected_release_job_digests
            abort <<~MESSAGE
              Every release job command, action, input, dependency, permission, and runner must remain on the reviewed allowlist.
              Expected: #{expected_release_job_digests}
              Actual:   #{actual_release_job_digests}
            MESSAGE
          end

          verify_job = release_jobs.fetch('verify-release-source')
          audit_job = release_jobs.fetch('audit-release-candidates')
          publish_job = release_jobs.fetch('publish')
          github_expression = lambda { |body| "#{expression} #{body} }}" }
          unique_step = lambda do |job, name|
            job_steps = job.fetch('steps')
            indexes = job_steps.each_index.select { |index| job_steps[index]['name'] == name }
            abort "Expected exactly one release step named #{name}." unless indexes.length == 1
            [indexes.first, job_steps.fetch(indexes.first)]
          end

          release_build_index, release_build = unique_step.call(
            verify_job,
            'Build Linux release packager'
          )
          source_index, source_step = unique_step.call(verify_job, 'Require tested main source')
          release_upload_index, release_upload = unique_step.call(
            verify_job,
            'Upload Linux release packager'
          )
          artifact_id_index, artifact_id_step = unique_step.call(
            verify_job,
            'Require Linux release packager artifact ID'
          )
          expected_release_build = {
            'name' => 'Build Linux release packager',
            'run' => <<~'SHELL'
              CARGO_TARGET_DIR=target/release-packager \
                cargo build --release --locked --package gamercatch-release-packager
              test -x target/release-packager/release/gamercatch-release-packager
            SHELL
          }
          expected_release_upload = {
            'name' => 'Upload Linux release packager',
            'id' => 'upload_release_packager',
            'uses' => 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a',
            'with' => {
              'name' => "linux-release-packager-#{github_expression.call('steps.source.outputs.release_commit')}-attempt-#{github_expression.call('github.run_attempt')}",
              'path' => 'target/release-packager/release/gamercatch-release-packager',
              'if-no-files-found' => 'error',
              'retention-days' => 14,
              'compression-level' => 0,
              'overwrite' => false
            }
          }
          expected_artifact_id_step = {
            'name' => 'Require Linux release packager artifact ID',
            'env' => {
              'ARTIFACT_ID' => github_expression.call(
                'steps.upload_release_packager.outputs.artifact-id'
              )
            },
            'run' => <<~'SHELL'
              case "$ARTIFACT_ID" in
                '' | *[!0-9]*)
                  echo "Linux release packager upload did not return a numeric artifact ID." >&2
                  exit 1
                  ;;
              esac
              test "$ARTIFACT_ID" -gt 0
            SHELL
          }
          expected_packager_output = github_expression.call(
            'steps.upload_release_packager.outputs.artifact-id'
          )
          unless release_build == expected_release_build &&
                 release_upload == expected_release_upload &&
                 artifact_id_step == expected_artifact_id_step &&
                 source_index == release_build_index + 1 &&
                 release_upload_index == source_index + 1 &&
                 artifact_id_index == release_upload_index + 1 &&
                 verify_job.fetch('outputs').fetch('release_packager_artifact_id') == expected_packager_output
            abort 'The Linux release packager must be built once, uploaded after source gates, and expose its immutable artifact ID.'
          end

          source_run = source_step.fetch('run')
          [
            'packager=target/release-packager/release/gamercatch-release-packager',
            '"$packager" package-version Cargo.toml',
            '"$packager" verify-versions'
          ].each do |marker|
            abort "The release source gate must use the reusable packager: #{marker}" unless source_run.include?(marker)
          end
          release_runs = release_jobs.values.flat_map do |job|
            job.fetch('steps', []).filter_map { |step| step['run'] }
          end
          build_command = 'cargo build --release --locked --package gamercatch-release-packager'
          unless release_runs.sum { |run| run.scan(build_command).length } == 1 &&
                 release_runs.none? { |run| run.include?('cargo run') }
            abort 'Release must build the Linux packager exactly once and never invoke cargo run.'
          end
          install_jobs = release_jobs.filter_map do |job_name, job|
            job_name if job.fetch('steps', []).any? { |step| step['name'] == 'Install Rust 1.88' }
          end
          unless install_jobs.sort == %w[macos verify-release-source]
            abort 'Only the producer and native macOS package job may install Rust in release.yml.'
          end

          expected_download = {
            'name' => 'Download Linux release packager',
            'uses' => 'actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c',
            'with' => {
              'artifact-ids' => github_expression.call(
                'needs.verify-release-source.outputs.release_packager_artifact_id'
              ),
              'path' => "#{github_expression.call('runner.temp')}/linux-release-packager",
              'digest-mismatch' => 'error'
            }
          }
          consumers = {
            'audit-release-candidates' => 'Validate reusable candidates',
            'publish' => 'Validate release assets'
          }
          unless audit_job.fetch('needs') == %w[verify-release-source macos] &&
                 publish_job.fetch('needs') == 'verify-release-source'
            abort 'Release consumers must depend directly on the Linux packager producer.'
          end
          consumers.each do |job_name, validation_name|
            job = release_jobs.fetch(job_name)
            download_index, download_step = unique_step.call(
              job,
              'Download Linux release packager'
            )
            validation_index, validation_step = unique_step.call(job, validation_name)
            validation_run = validation_step.fetch('run')
            required_validation_markers = [
              'tool_dir="$RUNNER_TEMP/linux-release-packager"',
              'packager="$tool_dir/gamercatch-release-packager"',
              %q{test "$(find "$tool_dir" -mindepth 1 -print | wc -l | tr -d ' ')" -eq 1},
              'test -f "$packager"',
              'test ! -L "$packager"',
              'test -s "$packager"',
              'chmod 0755 "$packager"',
              'test -x "$packager"',
              '"$packager" validate'
            ]
            consumer_runs = job.fetch('steps').filter_map { |step| step['run'] }
            forbidden_runtime = consumer_runs.any? do |run|
              run.match?(/\b(?:cargo|rustup)\b/) ||
                run.include?('CARGO_TARGET_DIR') ||
                run.include?('target/release-packager')
            end
            validation_marker_indexes = required_validation_markers.map do |marker|
              validation_run.index(marker)
            end
            unless download_step == expected_download &&
                   download_index < validation_index &&
                   validation_marker_indexes.none?(&:nil?) &&
                   validation_marker_indexes == validation_marker_indexes.sort &&
                   !forbidden_runtime
              abort "#{job_name} must download, allowlist, chmod, and use the immutable Linux packager without Rust."
            end
            if job_name == 'publish' && !validation_run.include?('"$packager" checksums')
              abort 'Publish must create checksums with the reusable Linux packager.'
            end
          end
          RUBY
          for marker in \
            'candidate_run_id' \
            'event=workflow_dispatch' \
            'head_sha=' \
            'release_commit' \
            '.workflow_run.head_sha' \
            '^sha256:[0-9a-f]{64}$' \
            'macos-release-candidate-' \
            'windows-release-candidate-' \
            'release-candidates-' \
            'attempt-' \
            'Audit reusable release candidates' \
            'artifact-ids:' \
            'run-id:' \
            'digest-mismatch: error'
          do
            grep -F "$marker" .github/workflows/release.yml >/dev/null
          done
          if grep -F 'runs-on: windows-latest' .github/workflows/release.yml; then
            echo 'Tag releases must reuse the Windows artifact from exact-SHA main CI.' >&2
            exit 1
          fi
          if grep -F 'needs: [macos, windows]' .github/workflows/release.yml; then
            echo 'Tag releases must publish the audited candidate instead of rebuilding it.' >&2
            exit 1
          fi
          publish_job="$(sed -n '/^  publish:/,$p' .github/workflows/release.yml)"
          for marker in \
            'if: github.event_name == '\''push'\''' \
            'environment: release' \
            'actions: read' \
            'contents: write' \
            'candidate_artifact_id' \
            'digest-mismatch: error'
          do
            grep -F "$marker" <<< "$publish_job" >/dev/null
          done

      - name: Protect user config in macOS launchers
        run: |
          test_root="$(mktemp -d)"
          trap 'rm -rf "$test_root"' EXIT
          cp scripts/1_首次設定.command "$test_root/"
          cp scripts/2_開始抓取.command "$test_root/"
          cp scripts/Gmail_首次授權.command "$test_root/"
          mkdir -p "$test_root/bin" "$test_root/playwright-driver/package"
          cp config.example.toml "$test_root/"

          cat > "$test_root/GamerCatch" <<'SCRIPT'
          #!/usr/bin/env bash
          exit 0
          SCRIPT
          cat > "$test_root/bin/open" <<'SCRIPT'
          #!/usr/bin/env bash
          printf '%s\n' "$*" >> "$OPEN_LOG"
          SCRIPT
          chmod +x "$test_root"/*.command "$test_root/GamerCatch" "$test_root/bin/open"
          touch "$test_root/playwright-driver/node" "$test_root/playwright-driver/package/cli.js"
          chmod +x "$test_root/playwright-driver/node"

          export OPEN_LOG="$test_root/open.log"
          export PATH="$test_root/bin:$PATH"
          printf '%s' 'schema_version = 2
          # keep-user-config' > "$test_root/config.toml"
          config_hash="$(sha256sum "$test_root/config.toml" | cut -d ' ' -f 1)"

          printf '\n' | "$test_root/1_首次設定.command"
          printf '\n' | "$test_root/2_開始抓取.command"
          printf '\n' | "$test_root/Gmail_首次授權.command"
          test "$(sha256sum "$test_root/config.toml" | cut -d ' ' -f 1)" = "$config_hash"
          if grep -F 'config.toml' "$OPEN_LOG"; then
            echo 'A launcher unexpectedly opened config.toml.' >&2
            exit 1
          fi

          rm "$test_root/config.toml"
          if printf '\n' | "$test_root/2_開始抓取.command" > "$test_root/missing-runner.log" 2>&1; then
            echo 'Runner must fail when config.toml is missing.' >&2
            exit 1
          fi
          if printf '\n' | "$test_root/Gmail_首次授權.command" > "$test_root/missing-gmail.log" 2>&1; then
            echo 'Gmail authorizer must fail when config.toml is missing.' >&2
            exit 1
          fi
          test ! -e "$test_root/config.toml"
          grep -F 'https://gamer-catch.pylot.dev/generator' "$test_root/missing-runner.log"
          grep -F 'https://gamer-catch.pylot.dev/generator' "$test_root/missing-gmail.log"

          : > "$OPEN_LOG"
          printf '\n' | "$test_root/1_首次設定.command"
          test ! -e "$test_root/config.toml"
          grep -Fx "$test_root/credentials" "$OPEN_LOG"
          grep -Fx 'https://gamer-catch.pylot.dev/guide#quick-start' "$OPEN_LOG"
          if grep -F 'config.toml' "$OPEN_LOG"; then
            echo 'First setup unexpectedly opened config.toml.' >&2
            exit 1
          fi

      - name: Require the website as the only manual
        run: |
          test -z "$(git ls-files '*.pdf')" || {
            echo "PDF manuals are retired; documentation must live under web/." >&2
            exit 1
          }
          test ! -e scripts/generate-manual.py
          grep -F 'https://gamer-catch.pylot.dev/guide#quick-start' 使用說明.txt
          retired_domain='gamer'\.'catch.pylot.dev'
          if git grep -F "$retired_domain"; then
            echo "The retired dotted subdomain must not return." >&2
            exit 1
          fi

      - name: Reject committed credentials
        run: |
          suspicious_files="$(git ls-files | grep -Ei '(^|/)(credentials?/.*\.json|[^/]*(service[-_]?account|gmail[-_]?oauth|oauth[-_]?client|gmail[-_]?token|credentials?)[^/]*\.json)$' || true)"
          if test -n "$suspicious_files"; then
            echo "Repository contains a possible service-account credential file." >&2
            printf '%s\n' "$suspicious_files" >&2
            exit 1
          fi
          while IFS= read -r json_file; do
            if grep -Eq '("type"[[:space:]]*:[[:space:]]*"service_account")|("(client_secret|private_key|refresh_token|access_token)"[[:space:]]*:[[:space:]]*"[^"]+")' "$json_file"; then
              echo "Tracked JSON looks like a Google credential or OAuth token: $json_file" >&2
              exit 1
            fi
          done < <(git ls-files '*.json')
